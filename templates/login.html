<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EmoLens — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0c10;--s1:#111118;--s2:#17171f;--s3:#1e1e28;
  --bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.12);
  --tx:#e4e4f0;--muted:#6b6b88;--green:#7864ff;
  --font:'Segoe UI',system-ui,sans-serif;--mono:'JetBrains Mono','Fira Mono',monospace;
}
body{font-family:var(--font);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.login-box{background:var(--s1);border:1px solid var(--bd2);border-radius:16px;padding:40px 36px;width:100%;max-width:380px}
.brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:28px}
.brand-icon{width:36px;height:36px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:20px;height:20px;stroke:#0a0a0d;fill:none;stroke-width:2.2}
.brand-name{font-size:17px;font-weight:700;letter-spacing:-0.3px}
h2{font-size:15px;font-weight:600;margin-bottom:6px;text-align:center}
.sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:28px;font-family:var(--mono)}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.field label{font-size:11px;font-family:var(--mono);color:var(--muted);letter-spacing:0.05em}
.field input{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:10px 14px;color:var(--tx);font-size:13px;font-family:var(--font);outline:none;transition:border-color 0.18s}
.field input:focus{border-color:var(--green)}
.btn-login{width:100%;padding:11px;background:var(--green);color:#0a0a0d;border:none;border-radius:9px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;margin-top:4px;transition:opacity 0.18s}
.btn-login:hover{opacity:0.85}
.err{font-size:12px;color:#D85A30;font-family:var(--mono);text-align:center;min-height:18px;margin-top:10px}
footer{margin-top:28px;font-family:var(--mono);font-size:10px;color:var(--muted);text-align:center}
</style>
</head>
<body>

<div class="login-box">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/><circle cx="12" cy="12" r="3" fill="#0a0a0d" stroke="none"/></svg>
    </div>
    <span class="brand-name">Emotisense</span>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to continue to Emotisense v2.0</p>

  <div class="field">
    <label>USERNAME</label>
    <input type="text" id="username" placeholder="Enter your name" autocomplete="username">
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" onclick="doLogin()">Sign in</button>
  <div class="err" id="err-msg"></div>
</div>

<footer>MCA Final Year Project &nbsp;·&nbsp; Emotisense v2.0</footer>

<script>
/* 
  Simple frontend-only auth using hardcoded users.
  For a real project, replace this with a backend API call.
*/
const USERS = [
  { username: 'admin',   password: 'admin123',  displayName: 'Admin User' },
  { username: 'student', password: 'pass1234',  displayName: 'Student' },
  /* Add more users here */
];

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err      = document.getElementById('err-msg');

  if (!username || !password) { err.textContent = 'Please fill in both fields.'; return; }

  const res  = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();

  if (data.success) {
    // Store display name for use in nav/downloads
    sessionStorage.setItem('emoUser', JSON.stringify({ displayName: data.display_name }));
    window.location.href = '/';
  } else {
    err.textContent = data.error || 'Login failed.';
    document.getElementById('password').value = '';
  }
}

/* Allow Enter key to submit */
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

/* Redirect if already logged in */
if (sessionStorage.getItem('emoUser')) window.location.href = 'result.html';
</script>
</body>
</html>
